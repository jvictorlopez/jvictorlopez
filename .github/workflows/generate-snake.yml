name: Generate activity snake

on:
  schedule:
    # Daily at 03:17 UTC (off the top of the hour to avoid GitHub's cron rush)
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "package.json"
      - ".github/workflows/generate-snake.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate snake SVG
        env:
          # GH_PAT (optional repo secret) includes private contributions;
          # the default GITHUB_TOKEN covers public activity.
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: node scripts/generate-snake.mjs

      - name: Commit regenerated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-snake.svg assets/github-snake-dark.svg
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh activity snake"
            git push
          fi
